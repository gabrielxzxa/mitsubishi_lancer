    <!-- Ajusta a pagina para funcionar bem em telas pequenas. -->
    <title>Impactos</title>
    <!-- Define o titulo da aba do navegador. -->
    <link rel="stylesheet" href="style.css">

<!-- Fecha as configuracoes da pagina. -->
<body>
    <!-- Inicia o conteudo que aparece na tela. -->
    <header>
        <!-- Cria o cabecalho do site. -->
        <nav>
            <!-- Cria o menu de navegacao. -->

            <ul>

        <!-- Define o conteudo principal da pagina. -->
        <section id="impactos">
            <!-- Cria a secao que mostra impactos positivos e negativos. -->

                <!-- Card dos impactos positivos. -->
